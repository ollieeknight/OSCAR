site_name: OSCAR
site_description: Ollie's Single Cell Analysis for the Romagnani lab
site_author: Oliver Knight
site_url: https://ollieeknight.github.io/OSCAR

repo_name: ollieeknight/OSCAR
repo_url: https://github.com/ollieeknight/OSCAR
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  
  icon:
    repo: fontawesome/brands/github
  
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ollieeknight/OSCAR
    - icon: fontawesome/solid/envelope
      link: mailto:oliver.knight@charite.de

extra_css:
  - assets/stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tools:
      - tools/index.md
      - Metadata Generator: tools/metadata-generator.html
      - Feature Barcode Generator: tools/adt-generator.html
  - Reference:
      - Functions: reference/functions.md
      - References: reference/references.md
